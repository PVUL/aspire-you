table:
  name: communities
  schema: public
object_relationships:
  - name: mission
    using:
      foreign_key_constraint_on: current_mission_id
array_relationships:
  - name: members
    using:
      foreign_key_constraint_on:
        column: community_id
        table:
          name: community_members
          schema: public
  - name: values
    using:
      manual_configuration:
        column_mapping:
          id: community_id
        insertion_order: null
        remote_table:
          name: community_current_values
          schema: public
computed_fields:
  - name: member_count
    definition:
      function:
        name: member_count
        schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - name
        - slug
        - is_public
        - current_mission_id
select_permissions:
  - role: public
    permission:
      columns:
        - id
        - name
        - slug
        - is_public
        - created_at
        - current_mission_id
      computed_fields:
        - member_count
      filter:
        is_public:
          _eq: true
  - role: user
    permission:
      columns:
        - id
        - name
        - slug
        - is_public
        - created_at
        - current_mission_id
      computed_fields:
        - member_count
      filter: {}
