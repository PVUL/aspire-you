table:
  name: communities
  schema: public
object_relationships:
  - name: current_mission
    using:
      foreign_key_constraint_on: current_mission_id
array_relationships:
  - name: current_values
    using:
      manual_configuration:
        column_mapping:
          id: community_id
        insertion_order: null
        remote_table:
          name: community_current_values
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - name
        - slug
        - is_public
        - current_mission_id
select_permissions:
  - role: public
    permission:
      columns:
        - id
        - name
        - slug
        - is_public
        - created_at
        - current_mission_id
      filter:
        is_public:
          _eq: true
  - role: user
    permission:
      columns:
        - id
        - name
        - slug
        - is_public
        - created_at
        - current_mission_id
      filter: {}
